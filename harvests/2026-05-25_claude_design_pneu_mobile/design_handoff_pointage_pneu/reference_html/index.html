  <link rel="preconnect" href="https://fonts.googleapis.com" />

    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" />
  <style>
    html, body { margin: 0; padding: 0; background: #f0eee9; font-family: Inter, system-ui, sans-serif; }
    *, *::before, *::after { box-sizing: border-box; }
    button { font-family: inherit; }
    /* Render the buttons inside artboards as truly inert so the canvas
       can capture clicks for drag/focus without weird focus rings. */
    .dc-card button { -webkit-tap-highlight-color: transparent; }
    .dc-card button:focus { outline: none; }
  </style>
</head>

</body>
