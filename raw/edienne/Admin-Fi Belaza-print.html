<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>LOI · Admin-Fi Belaza — TVA/IRSA & Décaissement</title>
<link rel="stylesheet" href="loi-tokens.css" />
<style>
  html, body { margin: 0; background: var(--bg); }
  body { color-scheme: dark light; font-size: 16px; }
  :root {
    --fs-body: 16px;
    --fs-small: 14px;
    --fs-micro: 12px;
  }
  .label, .micro-label { font-size: 12px !important; letter-spacing: 0.09em; font-weight: 600 !important; }
  .confirm-badge { font-size: 11px !important; padding: 3px 8px !important; }
  *::-webkit-scrollbar { width: 10px; height: 10px; }
  *::-webkit-scrollbar-thumb { background: color-mix(in srgb, var(--fg-3) 30%, transparent); border-radius: 999px; }
  *::-webkit-scrollbar-track { background: transparent; }

  /* ───── Print styles ───── */
  @page {
    size: A3 landscape;
    margin: 0.6cm;
  }
  @media print {
    html, body {
      background: var(--bg) !important;
      -webkit-print-color-adjust: exact !important;
      print-color-adjust: exact !important;
    }
    * {
      -webkit-print-color-adjust: exact !important;
      print-color-adjust: exact !important;
      animation: none !important;
      transition: none !important;
    }
    /* Hide chrome that doesn't belong on paper */
    aside { display: none !important; }                /* Sidebar */
    button[onclick] { box-shadow: none !important; }
    /* Variant switcher buttons */
    [style*="position: absolute"][style*="top: 12px"] { display: none !important; }
    /* Theme toggle */
    header button { display: none !important; }
    /* Main content takes full width */
    main { padding: 12px !important; overflow: visible !important; }
    main > div { max-width: none !important; }
    /* Avoid splitting cards across pages */
    [data-screen-label] > div > main > div > * {
      break-inside: avoid;
      page-break-inside: avoid;
    }
    /* Each large section starts on a new page after */
    h3 {
      break-after: avoid;
      page-break-after: avoid;
    }
    /* No overflow clipping */
    [style*="overflow"] { overflow: visible !important; }
    /* Make sure work queue rows don't break */
    [style*="display: grid"][style*="gridTemplateColumns"] {
      break-inside: avoid;
      page-break-inside: avoid;
    }
    /* Remove sticky/fixed positioning */
    [style*="position: fixed"], [style*="position: sticky"] {
      position: static !important;
    }
    /* Toasts hidden in print */
    [style*="position: fixed"][style*="z-index: 200"] { display: none !important; }
    footer { display: none !important; }
  }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="admin-fi-icons.jsx"></script>
  <script type="text/babel" src="admin-fi-modals.jsx"></script>
  <script type="text/babel" src="admin-fi-belaza.jsx"></script>

  <!-- Auto-print after fonts + React render settle -->
  <script type="text/babel">
    (async () => {
      // Wait for fonts
      if (document.fonts && document.fonts.ready) {
        try { await document.fonts.ready; } catch (e) {}
      }
      // Wait for React render
      await new Promise((r) => setTimeout(r, 800));
      // Belt-and-suspenders extra delay
      await new Promise((r) => setTimeout(r, 500));
      window.print();
    })();
  </script>
</body>
</html>
